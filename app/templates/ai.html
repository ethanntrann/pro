{% extends "base.html" %}

{% block content %}
<section class="ai-box">
    <h1>AI Assistant</h1>
    <p>Ask my AI assistant about my research, projects, leadership, or interests.</p>

    <div id="chat-window"></div>

    <div class="chat-controls">
        <input id="user-input" placeholder="Ask something about Ethan...">
        <button onclick="sendMessage()">Send</button>
    </div>
</section>

<script>
async function sendMessage() {
    const input = document.getElementById("user-input");
    const chatWindow = document.getElementById("chat-window");
    const message = input.value;

    if (message.trim() === "") return;

    chatWindow.innerHTML += `<p><strong>You:</strong> ${message}</p>`;
    input.value = "";

    const response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    });

    const data = await response.json();
    chatWindow.innerHTML += `<p><strong>AI:</strong> ${data.reply}</p>`;
    chatWindow.scrollTop = chatWindow.scrollHeight;
}
</script>
{% endblock %}
