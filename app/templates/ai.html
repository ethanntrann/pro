{% extends "base.html" %}

{% block content %}
<section class="ai-box">
    <h1>AI Assistant</h1>

    <div id="chat-window">
        <p><strong>AI:</strong> Hello! Ask me any question about Ethan's research, projects, leadership, or interests!</p>
    </div>

    <div class="chat-controls">
        <input id="user-input" placeholder="Ask something about Ethan...">
        <button onclick="sendMessage()">Send</button>
    </div>
</section>

<script>
async function sendMessage() {
    const input = document.getElementById("user-input");
    const chatWindow = document.getElementById("chat-window");
    const message = input.value;

    if (message.trim() === "") return;

    addMessage("You", message);
    input.value = "";

    const response = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: message})
    });

    const data = await response.json();
    addMessage("AI", data.reply);
    chatWindow.scrollTop = chatWindow.scrollHeight;
}

function addMessage(sender, text) {
    const chatWindow = document.getElementById("chat-window");
    const message = document.createElement("p");
    const label = document.createElement("strong");

    label.textContent = `${sender}: `;
    message.appendChild(label);
    if (sender === "AI") {
        const response = document.createElement("span");
        response.innerHTML = formatAssistantText(text);
        message.appendChild(response);
    } else {
        message.appendChild(document.createTextNode(text));
    }
    chatWindow.appendChild(message);
}

function formatAssistantText(text) {
    const escaped = text
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");

    return escaped
        .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
        .replace(/\*(.*?)\*/g, "<em>$1</em>");
}
</script>
{% endblock %}
